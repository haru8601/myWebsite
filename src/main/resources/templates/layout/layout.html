<!doctype html>
<html
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  th:with="site=${@environment.getProperty('path.site')}"
>
  <head>
    <!-- gtag読み込み -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-KG2Q0JRLTH"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-KG2Q0JRLTH");
    </script>

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <link type="text/css" rel="stylesheet" th:href="@{/css/modules.css}" />
    <!-- FIXME: デザインリニューアル時に対応 -->
    <!-- <link
      rel="stylesheet"
      th:href="@{/css/responsive.css}"
      media="print"
      onload="this.media='all'"
    /> -->
    <link rel="shortcut icon" th:href="@{/images/favicon.ico}" />
    <!--FontAwesome用-->
    <!-- NOTE: scssからのnpm直参照だとttfファイルが読めないので一旦CDNを使用 -->
    <script
      src="https://kit.fontawesome.com/cee3ec41f4.js"
      crossorigin="anonymous"
    ></script>
    <title>layout page</title>
  </head>

  <body>
    <header layout:replace="~{/layout/header::header}"></header>
    <div>
      <main layout:fragment="content"></main>
      <th:block th:if="${isTop == null || !isTop}">
        <!-- adsense設置場所 -->
        <div layout:replace="~{/layout/ads::ads}"></div>
      </th:block>
      <div layout:replace="~{/layout/footer::footer}"></div>
    </div>
    <script th:src="@{/js/global.js}"></script>
  </body>
</html>
