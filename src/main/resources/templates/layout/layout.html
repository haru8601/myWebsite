<!doctype html>
<html
  lang="ja"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:th="http://www.thymeleaf.org"
  th:with="site=${@environment.getProperty('path.site')},profile=${@environment.getProperty('spring.profiles.active')}"
>
  <head>
    <!-- gtag読み込み -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-KG2Q0JRLTH"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        // biome-ignore lint/complexity/noArguments: gtag公式の記述方法
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-KG2Q0JRLTH");
    </script>

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <link
      rel="stylesheet"
      type="text/css"
      media="all"
      th:href="@{/dist/bundler.css}"
    />
    <link rel="shortcut icon" th:href="@{/images/favicon.ico}" />
    <title>layout page</title>
  </head>

  <body>
    <header th:replace="~{/layout/header::header}"></header>
    <div>
      <main layout:fragment="content"></main>
      <th:block th:if="${isTop == null || !isTop}">
        <!-- adsense設置場所 -->
        <th:block th:if="${profile != 'local'}">
          <div th:replace="~{/layout/ads::ads}"></div>
        </th:block>
      </th:block>
      <div th:replace="~{/layout/footer::footer}"></div>
    </div>
    <script th:src="@{/dist/bundler.bundle.js}"></script>
    <script th:src="@{/dist/embed-svg.bundle.js}"></script>
    <script th:src="@{/dist/toggle-menu.bundle.js}"></script>
  </body>
</html>
