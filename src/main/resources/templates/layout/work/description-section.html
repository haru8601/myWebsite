<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <body>
    <div th:fragment="description-section(imgSrc, textJp, textEn)" class="mb-5">

      <p th:text="${textJp}"></p>
      <p th:if="${textEn != null}" th:text="${textEn}"></p>
    </div>
  </body>
</html>
