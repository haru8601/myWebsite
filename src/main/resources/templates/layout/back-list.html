<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <body>
    <th:block th:fragment="backList(link, name)">
      <a th:href="${link}" class="d-inline-flex gap-3 align-items-center mb-4">
        <!--/* NOTE: flexにして高さを子要素に合わせている */-->
        <div class="h4 m-0 d-flex">
          <i class="fa-solid fa-angle-left"></i>
        </div>
        <p th:text="${name}" class="hr-dot mb-0"></p>
      </a>
    </th:block>
  </body>
</html>
