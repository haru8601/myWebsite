<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <body>
    <!--/* NOTE: svgの情報をdata属性でjsに渡す */-->
    <div
      th:fragment="embeddedSvg(svgPath, width, maxHeight)"
      th:data-svg-path="${svgPath}"
      th:data-svg-width="${width}"
      th:data-svg-max-height="${maxHeight}"
      class="hr-embedded-svg-container"
    >
      <!--/* NOTE: レイアウトシフトを防ぐため、ダミーのスペースを確保している */-->
      <img th:style="|width: ${width}; max-height: ${maxHeight}|" />
    </div>
  </body>
</html>
