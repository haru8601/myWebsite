<!doctype html>
<html lang="ja" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
  <head>
    <title>header page</title>
  </head>

  <body>
    <header
      layout:fragment="header"
      class="p-3 border-bottom border-1 border-black"
    >
      <div class="d-flex justify-content-between">
        <div class="header-logo">
          <a href="/">haroot.net</a>
        </div>
        <div class="header-links d-flex gap-3">
          <th:block
            th:each="topic: ${T(com.haroot.home_page.enums.TopicEnum).values()}"
          >
            <a th:href="${topic.url}" th:text="${topic.title}"></a>
          </th:block>
        </div>
      </div>
    </header>
  </body>
</html>
