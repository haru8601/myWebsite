<!doctype html>
<html lang="ja" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
  <head>
    <title>header page</title>
  </head>

  <body>
    <header
      th:fragment="header"
      class="p-3 border-bottom border-1 border-black bg-black"
    >
      <div class="d-flex justify-content-between">
        <div>
          <a href="/" role="button">
            <img th:src="@{/images/haroot-logo.svg}" width="150px" />
          </a>
        </div>
        <div class="d-flex gap-3">
          <th:block
            th:each="topic: ${T(com.haroot.home_page.enums.TopicEnum).values()}"
          >
            <a
              class="d-flex gap-1 align-items-center"
              th:href="@{|/${topic.url}|}"
              ><img
                th:src="@{/images/noImage.png}"
                width="20px"
                height="20px" />
              <p class="hr-dot m-0" th:text="${topic.title}"></p
            ></a>
          </th:block>
        </div>
      </div>
    </header>
  </body>
</html>
