<!doctype html>
<html lang="ja" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
  <head>
    <title>header page</title>
  </head>

  <body>
    <header
      th:fragment="header"
      class="p-3 border-bottom border-1 border-black"
    >
      <div class="d-flex justify-content-between">
        <div>
          <a href="/">haroot.net</a>
        </div>
        <div class="d-flex gap-3">
          <th:block
            th:each="topic: ${T(com.haroot.home_page.enums.TopicEnum).values()}"
          >
            <a class="d-flex gap-1" th:href="@{|/${topic.url}|}"
              ><img
                th:src="@{/images/noImage.png}"
                width="20px"
                height="20px" /><span
                class="hr-dot h5"
                th:text="${topic.title}"
              ></span
            ></a>
          </th:block>
        </div>
      </div>
    </header>
  </body>
</html>
