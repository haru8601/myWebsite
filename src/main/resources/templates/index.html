<!doctype html>
<html lang="ja">
  <!--/* NOTE: フッターやヘッダーがないため、layout.htmlを使用しない */-->
  <head>
    <!--/* layout.htmlと同じ設定 */-->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0"
    />
    <!--bootstrap用-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" th:href="@{/css/global.css}" />
    <!-- FIXME: デザインリニューアル時に対応 -->
    <!-- <link
      rel="stylesheet"
      th:href="@{/css/responsive.css}"
      media="print"
      onload="this.media='all'"
    /> -->
    <link rel="shortcut icon" th:href="@{/images/favicon.ico}" />
    <!--FontAwesome用-->
    <script
      src="https://kit.fontawesome.com/cee3ec41f4.js"
      crossorigin="anonymous"
    ></script>
    <!--/* layout.htmlと同じ設定ここまで */-->

    <title>はるーとのホームページ - haroot.net</title>
    <link type="text/css" rel="stylesheet" th:href="@{/css/top.css}" />
    <meta
      name="description"
      content="はるーとのホームページです。自作iosアプリの概要ページ、swiftやvscodeについての技術記事、自分のyoutubeの紹介ページ等で構成されています。"
    />
    <!--Twitterカード用-->
    <!--twitter以外でも使えるやつ-->
    <meta property="og:type" content="website" />
    <meta
      id="share-title"
      property="og:title"
      content="はるーとのホームページ"
    />
    <meta
      id="share-detail"
      property="og:description"
      content="haroot.netのホームページです。"
    />
    <meta id="share-url" property="og:url" content="https://haroot.net" />
    <meta property="og:site_name" th:content="${site}" />
    <meta
      property="og:image"
      content="https://haroot.net/images/homePage.png"
    />
    <!--twitter特有の設定-->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@haroot_net" />
  </head>

  <body>
    <main id="top" layout:fragment="content">
      <!--launch画面(他サイトやトップから飛んできた場合のみ)-->
      <th:block th:if="${displaySlot}">
        <div id="launch">
          <!--importmapがブラウザによっては対応してないので定義(polyfill)-->
          <script
            async
            src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"
          ></script>
          <script type="importmap">
            {
              "imports": {
                "three": "https://unpkg.com/three@0.150.0/build/three.module.js"
              }
            }
          </script>
          <!-- キャンバスサイズは実際の表示サイズとは別 -->
          <canvas id="canvas1" width="700" height="800">
            <script type="module" th:src="@{/js/canvas.js}"></script>
          </canvas>
        </div>
      </th:block>
      <div class="d-flex justify-content-center">
        <h1>haroot.net</h1>
      </div>
      <div class="topic-all d-flex flex-column align-items-center">
        <a
          class="topic-link down-btn"
          th:each="topic: ${T(com.haroot.home_page.enums.TopicEnum).values()}"
          th:href="${topic.url}"
          th:if="${topic.displayInTop}"
        >
          <div class="topic">
            <div class="topic-text">
              <h2 th:text="${topic.title}"></h2>
            </div>
          </div>
        </a>
      </div>
    </main>
  </body>
</html>
