<!doctype html>
<html
  la="ja"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/layout/layout}"
  th:with="topic=${T(com.haroot.home_page.enums.TopicEnum).ARTICLES}"
>
  <head>
    <title th:text="|${topic.titleJp} - ${site}|">haroot</title>
    <meta name="description" th:content="${topic.summary}" />
  </head>

  <body>
    <main class="articles" layout:fragment="content">
      <th:block th:if="${errStr!=''}">
        <p class="errStr" th:text="${errStr}"></p>
      </th:block>
      <div>
        <a
          th:each="article: ${articleList}"
          th:object="${article}"
          th:href="@{|/${topic.url}/*{id}|}"
        >
          <div class="d-flex flex-column">
            <div>
              <p class="h2 fw-bold" th:text="*{title}"></p>
              <th:block th:if="*{wip==true}">
                <span>※非公開</span>
              </th:block>
            </div>
            <div class="d-flex">
              <p
                th:text="${#temporals.format(article.updateDate, 'yyyy/MM/dd')}"
              ></p>
              <i class="fa-solid fa-heart text-danger"></i>
              <p th:text="*{likeCount}"></p>
            </div>
            <div th:each="tag: *{tagList}">
              <span th:text="${tag.tagId}"></span>
            </div>
          </div>
        </a>
      </div>
      <th:block th:if="${session.isLogin}">
        <a class="btn1 right" th:href="@{/articles/create}">新規作成</a>
      </th:block>
      <div class="clear"></div>
    </main>
  </body>
</html>
