<!doctype html>
<html
  lang="ja"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/contents/work/template}"
>
  <body>
    <div layout:fragment="work-custom-content">
      <th:block
        th:replace="~{layout/work/description-section :: description-section(
          '/images/work/game/poke-shiritori/timer-add.png',
          '制限時間内にたくさん答えることで、スコアが増えます。',
          'The more words you answer in time, the higher your score.'
        )}"
      ></th:block>
      <th:block
        th:replace="~{layout/work/description-section :: description-section(
          '/images/work/game/poke-shiritori/result.png',
          'スコアはランキングに保存できます。',
          'Your score can be saved to the leaderboard.'
        )}"
      ></th:block>
      <th:block
        th:replace="~{layout/work/description-section :: description-section(
          '/images/work/game/poke-shiritori/super-effective.png',
          '相手ポケモンに有利なタイプを持っている場合、スコアが大きく伸びます。',
          'Super effective types give your score a big boost.'
        )}"
      ></th:block>
    </div>
  </body>
</html>
