<!doctype html>
<html
  lang="ja"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/layout/layout}"
  th:with="topic=${T(com.haroot.home_page.enums.TopicEnum).WORK}"
>
  <head>
    <title th:text="|${work.title} - ${site}|">haroot</title>
    <meta name="description" th:content="${work.summary}">
  </head>
  <body>
    <main id="hunterScriptQuiz" layout:fragment="content">
      <th:block
        th:replace="~{layout/back-list :: backList(|/${topic.url}|, ${topic.title})}"
      ></th:block>
      <div th:object="${work}">
        <p class="h2" th:text="*{title}"></p>
        <p class="hr-hunter-script" th:text="*{title}"></p>

        <div
          class="hr-bg-vintage-paper d-flex flex-column align-items-center py-md-5 py-0 my-4 gap-md-4 gap-2 position-relative"
        >
          <!--/* NOTE: 正誤判定のマークはクイズが表示されてるエリアの中心に表示する */-->
          <i id="quizOk" class="hr-quiz-judge fa-regular fa-circle d-none"></i>
          <i id="quizNg" class="hr-quiz-judge fa-solid fa-xmark d-none"></i>

          <div class="d-flex flex-column align-items-center pt-3">
            <label
              id="hunter-q"
              for="hunter-input"
              class="form-label hr-hunter-script h1 text-black"
              th:text="${words}"
            ></label>
            <p id="hunter-a" class="h5 text-black"></p>
          </div>
          <div class="w-75 text-center">
            <input class="form-control d-inline-block" id="hunter-input">
          </div>
          <div class="d-flex flex-column align-items-center gap-2 pb-3">
            <button
              type="button"
              id="judge-btn"
              class="hr-outer-shadow-btn btn btn-danger rounded-pill text-white px-4 py-2"
            >
              <span class="h5">回答する</span>
            </button>
            <a id="show-answer-btn" class="text-black" role="button">
              正解を見る
            </a>
            <a
              id="next-question-btn"
              class="d-none text-black d-flex align-items-baseline gap-1"
              role="button"
            >
              <span>次の問題へ</span>
              <i class="fa-solid fa-chevron-right"></i>
            </a>
          </div>
        </div>
        <div id="data-container" th:data-words="${words}">
          <script th:src="@{/dist/check-answer.bundle.js}"></script>
        </div>
      </div>
    </main>
  </body>
</html>
