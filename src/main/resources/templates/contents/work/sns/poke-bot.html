<!doctype html>
<html

  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/contents/work/template}"
>
  <body>
    <div layout:fragment="work-custom-content">
      <th:block
        th:replace="~{layout/work/description-section :: description-section(
          '/images/work/sns/poke-bot/tweet-incorrect.png',

        )}"
      ></th:block>
      <th:block
        th:replace="~{layout/work/description-section :: description-section(
          '/images/work/sns/poke-bot/tweet-correct.png',

      ></th:block>
