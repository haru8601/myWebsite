<!doctype html>
<html
  lang="ja"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/contents/work/template}"
>
  <body>
    <div id="minecraft-music" layout:fragment="work-custom-content">
      <div class="container-fluid">
        <div
          th:if="${firstViewVideo}"
          th:object="${firstViewVideo}"
          class="row my-5"
        >
          <div class="col text-center">
            <a target="_blank" th:href="*{url}">
              <img
                id="firstview-thumbnail"
                th:src="*{imagePath}"
                alt=""
                onerror="
                  this.onerror = null;
                  this.src = '/images/noImage.png';
                "
              >
            </a>
          </div>
        </div>
        <div class="row row-cols-md-2 row-cols-1 g-5">
          <div th:each="video: ${videoList}" th:object="${video}" class="col">
            <a target="_blank" th:href="*{url}">
              <!--/* NOTE: 例外的に横幅をcolの幅に合わせる */-->
              <img
                class="hr-img"
                th:src="*{imagePath}"
                alt=""
                onerror="
                  this.onerror = null;
                  this.src = '/images/noImage.png';
                "
                width="100%"
              >
              <p th:text="*{title}"></p>
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
