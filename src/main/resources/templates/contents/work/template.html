<!doctype html>
<html
  lang="ja"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/layout/layout}"
  th:with="topic=${T(com.haroot.home_page.enums.TopicEnum).WORK}"
>
  <head>
    <title th:text="|${work.title} - ${site}|">haroot</title>
    <meta name="description" th:content="${work.summary}">
  </head>

  <body>
    <main id="work-template" layout:fragment="content">
      <th:block
        th:replace="~{layout/back-list :: backList(|/${topic.url}|, ${topic.title})}"
      ></th:block>
      <p class="h2 fw-bold" th:text="${work.title}"></p>
      <p th:text="${work.titleEn}"></p>
      <div class="container-fluid mt-4 mb-5">
        <div class="row flex-md-row flex-column gap-md-0 gap-3">
          <!--/* NOTE: 左端をタイトルと合わせるためpaddingを削除 */-->
          <div class="col-md-4 col-8 p-0">
            <a
              th:if="${work.workUrl}"
              th:href="${work.workUrl}"
              target="_blank"
              class="hr-inner-shadow-btn btn btn-danger px-3 py-2 d-inline-flex align-items-baseline gap-2"
            >
              <!--/* NOTE: SNSの場合は背景に寄らず画像が見やすいのでデフォルトの画像を使用 */-->
              <th:block th:if="${work.genre.name == 'SNS'}">
                <th:block
                  th:replace="~{layout/embedded-svg :: embeddedSvg(|/images/${work.genre.imagePath}|, '30px', '30px')}"
                ></th:block>
              </th:block>
              <th:block th:unless="${work.genre.name == 'SNS'}">
                <th:block
                  th:replace="~{layout/embedded-svg :: embeddedSvg(|/images/${#strings.replace(work.genre.imagePath, '.svg', '-dark.svg')}|, '30px', '30px')}"
                ></th:block>
              </th:block>
              <span
                th:text="${(work.genre.name == 'GAME' || work.genre.name == 'APPS') ? 'PLAY NOW !' : 'WATCH NOW !'}"
                class="hr-dot text-white"
              ></span>
            </a>
          </div>
          <div class="col-md-8 col-12 p-0">
            <p th:text="${work.summary}"></p>
            <p th:text="${work.summaryEn}"></p>
            <a
              th:if="${work.policyUrl}"
              th:href="@{|/policy/${work.policyUrl}|}"
              class="text-decoration-underline"
              >Privacy Policy</a
            >
            <div class="d-flex gap-2 mt-3">
              <th:block th:each="tag: ${work.tagList}">
                <th:block
                  th:replace="~{layout/tag :: tag(${tag.tagName}, ${tag.tagType})}"
                ></th:block>
              </th:block>
            </div>
          </div>
        </div>
      </div>

      <div layout:fragment="work-custom-content"></div>
    </main>
  </body>
</html>
