<!doctype html>
<html
  la="ja"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/layout/layout}"
  th:with="topic=${T(com.haroot.home_page.enums.TopicEnum).WORK}"
>
  <head>
    <title th:text="|${topic.titleJp} - ${site}|">haroot</title>
    <meta name="description" th:content="${topic.summary}" />
  </head>

  <body>
    <main id="work" layout:fragment="content">
      <div id="toc" class="d-flex gap-5 justify-content-center">
        <a
          th:each="workGenre: ${workListMap}"
          th:href="|#${workGenre.key.name}|"
        >
          <div class="text-center">
            <img
              th:src="@{|/images/${workGenre.key.imagePath}|}"
              width="50px"
              height="50px"
            />
            <p th:text="${workGenre.key.name}" class="hr-dot"></p>
          </div>
        </a>
      </div>
      <div class="d-flex flex-column align-items-center gap-5">
        <div
          th:each="workGenre: ${workListMap}"
          th:id="${workGenre.key.name}"
          class="hr-work-genre"
        >
          <p
            th:text="${workGenre.key.name}"
            class="hr-dot h1 text-center mb-3"
          ></p>
          <div class="d-flex gap-5">
            <a
              th:each="work: ${workGenre.value}"
              th:href="@{|/work/${workGenre.key.url}/${work.name}|}"
            >
              <img
                th:src="@{/images/noImage.png}"
                width="300px"
                height="300px"
              />
              <p th:text="${work.title}" class="mb-1"></p>
              <p th:text="${work.titleEn}"></p>
            </a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
