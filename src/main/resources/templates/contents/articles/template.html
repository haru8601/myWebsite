<!doctype html>
<html
  la="ja"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/layout/layout}"
  th:with="topic=${T(com.haroot.home_page.enums.TopicEnum).ARTICLES}"
>
  <!--/* OGP用の名前空間をprefixで定義 */-->
  <head prefix="og: http://ogp.me/ns#" th:object="${article}">
    <meta name="description" th:content="|*{title}についての記事です。|" />
    <!--marked用-->
    <script src="https://cdn.jsdelivr.net/npm/marked@16.3.0/lib/marked.umd.min.js"></script>
    <!-- 記事の各見出しにidを付与する -->
    <script src="https://cdn.jsdelivr.net/npm/marked-gfm-heading-id@4.1.2/lib/index.umd.min.js"></script>
    <!--syntaxHighlight用-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/default.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <!--jquery用-->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <!--Twitterカード用-->
    <!--twitter以外でも使えるやつ-->
    <meta property="og:type" content="article" />
    <meta id="share-title" property="og:title" th:content="*{title}" />
    <meta
      id="share-detail"
      property="og:description"
      th:content="|*{title}についての記事です。|"
    />
    <meta
      id="share-url"
      property="og:url"
      th:content="@{|/${topic.url}/*{id}|}"
    />
    <meta property="og:site_name" content="${site}" />
    <meta
      property="og:image"
      th:content="|https://haroot.net/images/${topic.url}/*{id}/thumbnail.png|"
    />
    <!--twitter特有の設定-->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:site" content="@haroot_net" />
  </head>

  <body>
    <main
      id="article-template"
      layout:fragment="content"
      th:object="${article}"
    >
      <a
        href="/articles"
        id="hr-back-btn"
        class="d-inline-flex gap-3 align-items-center mb-4"
      >
        <i class="fa-solid fa-angle-left"></i>
        <p th:text="${topic.title}" class="hr-dot h1 mb-0"></p>
      </a>
      <div class="d-flex">
        <!-- リンクサイドバー -->
        <div
          id="hr-article-actions"
          class="d-flex flex-column align-items-center gap-3"
        >
          <div>
            <button type="button" onclick="updateCount()">
              <img th:src="@{/images/noImage.png}" width="30px" />
            </button>
            <p id="likeCount" th:text="${likeCount}" class="hr-dot text-center">
              0
            </p>
          </div>
          <div>
            <a
              target="_blank"
              href="https://twitter.com/share?url=https://haroot.net"
              class="twitter-share-button"
              data-show-count="false"
            >
              <i class="hr-icon fa-brands fa-x-twitter"></i>
            </a>
          </div>
          <div class="d-flex flex-column">
            <button onclick="copy()" class="mx-auto">
              <img th:src="@{/images/noImage.png}" width="30px" />
            </button>
            <p
              id="copyText"
              class="hr-dot bg-white text-black text-center rounded-pill my-2 px-3"
            >
              LINK COPIED!
            </p>
          </div>
        </div>
        <!-- 記事詳細 -->
        <div id="hr-article-detail">
          <th:block th:if="${errStr!=''}">
            <p th:text="${errStr}"></p>
          </th:block>
          <p th:text="*{title}" class="h2"></p>
          <th:block th:if="*{wip==true}">
            <p>※非公開</p>
          </th:block>
          <p th:if="*{createDate != null}">
            作成日時:
            <span
              th:text="${#temporals.format(article.createDate, 'yyyy/MM/dd')}"
            ></span>
          </p>
          <p th:if="*{updateDate != null}">
            更新日時:
            <span
              th:text="${#temporals.format(article.updateDate, 'yyyy/MM/dd')}"
            ></span>
          </p>
          <pre>
				<div class="marked" id="content"></div>
			</pre>
          <script th:inline="javascript">
            //コードブロックをハイライト
            hljs.highlightAll();
            //thymleafのインライン処理(デフォルトを""にした)
            let text = /*[[*{content}]]*/ "";
            //部分的なコードはmarkedが対応してないから自分でspanにして色付け
            text = text.replaceAll(/`(?!`)(.*?)`/gm, "<span>$1</span>");
            //リンクは別タブにしたいのでhtml化
            //ただし画像のリンクは対象外に(safariが後読み非対応らしいので[^!]で)
            text = text.replaceAll(
              /([^!])\[(.*?)\]\((.*?)\)/gm,
              `$1<a href="$3" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i>$2</a>`,
            );
            //テキストをマークダウン化して貼り付け
            marked.use(window.markedGfmHeadingId.gfmHeadingId({ prefix: "" }));
            document.getElementById("content").innerHTML = marked.parse(text);
          </script>
          <th:block th:if="${session.isLogin}">
            <a class="btn1 right" th:href="@{|/articles/edit/*{id}|}">編集</a>
          </th:block>
        </div>
        <!-- 目次 -->
        <div id="hr-article-toc">
          <div id="contents-sticky"></div>
        </div>
      </div>
      <script th:src="@{/js/tableOfContents.js}"></script>
      <script>
        //ツイート内容カスタマイズ
        const tweetBtn = document.getElementsByClassName(
          "twitter-share-button",
        )[0];
        const title = document.getElementsByClassName("title")[0].textContent;
        const articleUrl = location.href;
        const tweetUrl = `https://twitter.com/share?text=${title}&url=${articleUrl}`;
        tweetBtn.setAttribute("href", tweetUrl);
      </script>
      <script th:src="@{/js/likeInfo.js}"></script>
      <script th:src="@{/js/copy.js}"></script>
    </main>
  </body>
</html>
