<!doctype html>
<html
  la="ja"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/layout/layout}"
  th:with="topic=${T(com.haroot.home_page.enums.TopicEnum).WORKS}"
>
  <head>
    <title th:text="|${topic.getTitleJp()} - ${site}|">haroot</title>
    <meta name="description" th:content="${topic.getSummary()}" />
  </head>

  <body>
    <main id="works" layout:fragment="content">
      <div id="toc" class="hr- d-flex gap-5 justify-content-center">
        <div th:each="workGenre: ${worksMap}" class="text-center">
          <img th:src="@{/images/noImage.png}" width="20px" height="20px" />
          <p th:text="${workGenre.key.name}" class="hr-dot h2"></p>
        </div>
      </div>
      <div class="d-flex flex-column align-items-center gap-5">
        <div th:each="workGenre: ${worksMap}">
          <p
            th:text="${workGenre.key.name}"
            class="hr-dot hr-size-1 text-center"
          ></p>
          <div class="d-flex gap-5">
            <a
              th:each="works: ${workGenre.value}"
              th:href="@{|/works/${workGenre.key.url}/${works.url}|}"
            >
              <img
                th:src="@{/images/noImage.png}"
                width="300px"
                height="300px"
              />
              <p th:text="${works.title}" class="mb-1"></p>
              <p th:text="${works.titleEn}"></p>
            </a>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
