<!doctype html>
<html
  lang="ja"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{/layout/layout}"
  th:with="topic=${T(com.haroot.home_page.enums.TopicEnum).CONTACT}"
>
  <head>
    <title th:text="|${topic.titleJp} - ${site}|">haroot</title>
    <meta name="description" th:content="${topic.summary}" />
     <script src="https://www.google.com/recaptcha/api.js?render=reCAPTCHA_site_key"></script>
  </head>

  <body>
    <main id="contact" layout:fragment="content">
      <!--/* NOTE: 左寄せだと余白が多すぎるので中央揃えにしている */-->
      <form
        id="contactForm"
        th:object="${formDto}"
        action="/contact/send"
        method="post"
        class="d-flex flex-column align-items-center"
      >
        <div>
          <p>
            ご質問、ご相談につきましては下記フォームからお問い合わせください。
          </p>
          <p>※スパムと判断した内容はお送りいただけない場合がございます。</p>

          <p class="mt-3">
            Please use the form below for any questions or inquiries.
          </p>
        </div>
        <div class="d-flex flex-column gap-4 mt-5">
          <div>
            <label for="name" class="form-label"
              >名前<span class="ms-2">Name</span></label
            >
            <input
              th:field="*{name}"
              class="form-control"
              autocomplete="name"
              th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
            />
            <p
              class="invalid-feedback"
              th:if="${#fields.hasErrors('name')}"
              th:errors="*{name}"
            ></p>
          </div>
          <div>
            <label for="email" class="form-label"
              >メールアドレス<span class="ms-2">Email Address</span></label
            >
            <input
              th:field="*{email}"
              class="form-control"
              autocomplete="email"
              th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
            />
            <p
              class="invalid-feedback"
              th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}"
            ></p>
          </div>
          <div>
            <label for="content" class="form-label"
              >お問い合わせ内容<span class="ms-2">Message</span></label
            >
            <textarea
              class="form-control"
              th:field="*{content}"
              rows="8"
              th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"
            ></textarea>
            <p
              class="invalid-feedback"
              th:if="${#fields.hasErrors('content')}"
              th:errors="*{content}"
            ></p>
          </div>
          <div>
            <input
              id="checkbox"
              name="checkbox"
              type="checkbox"
              th:checked="*{checkbox}"
              class="form-check-input rounded-1"
              role="button"
              th:classappend="${#fields.hasErrors('checkbox')} ? 'is-invalid'"
            />
            <!--/* NOTE: バリデーションエラーになっても赤文字にしない */-->
            <label
              for="checkbox"
              class="form-check-label text-white"
              role="button"
            >
              はるーとの<a
                href="/policy"
                class="text-decoration-underline"
                target="_blank"
                >プライバシーポリシー</a
              >に同意します。<br />
              <span class="ms-2"
                >I agree to Haroot's
                <a
                  href="/policy"
                  class="text-decoration-underline"
                  target="_blank"
                  >Privacy Policy</a
                >.</span
              >
            </label>
            <p
              class="invalid-feedback"
              th:if="${#fields.hasErrors('checkbox')}"
              th:errors="*{checkbox}"
            ></p>
          </div>
        </div>
        <input type="hidden" id="recaptchaToken" name="recaptchaToken" />
        <div class="text-center my-4">
          <input
            type="submit"
            class="btn btn-danger text-white"
            value="送信 Send"
          />
        </div>
      </form>
    </main>
    <script th:src="@{/dist/submit-contact.bundle.js}"></script>
  </body>
</html>
